<body>
    <div>
        <input id="inp" type="number" placeholder="Enter age">
        <button id="button" onclick="checkAge()">Submit</button>
        <p id="message"></p>
    </div>

<script>
    

    function checkAge(){
        let inp=document.getElementById('inp').value
        let message=document.getElementById('message')
        if(inp>=18){
            message.innerHTML="u can vote!!"

        }else{
            message.innerHTML="oops!! u can't vote kidooo!!"
        }
    }
</script>
